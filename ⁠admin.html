<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOWA - لوحة التحكم</title>
  <style>
    :root {
      --bg: #0d0e12;
      --card: #181a20;
      --accent: #e50914;
      --text: #ffffff;
      --text-muted: #a0a0a0;
      --border: #2a2d34;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: var(--card);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .header h1 {
      color: var(--accent);
      font-size: 1.5rem;
      letter-spacing: 1px;
    }

    .header a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .header a:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background-color: #0d0e12;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 10px;
    }

    button:hover {
      opacity: 0.9;
    }

    .status-msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      display: none;
      text-align: center;
      font-size: 0.9rem;
    }

    .status-msg.success {
      background-color: rgba(46, 204, 113, 0.15);
      color: #2ecc71;
      border: 1px solid #2ecc71;
      display: block;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>SHOWA ADMIN</h1>
      <a href="index.html">الرئيسية ←</a>
    </div>

    <form id="addMediaForm">
      <div class="form-group">
        <label>عنوان الفيلم / المسلسل</label>
        <input type="text" id="title" placeholder="أدخل العنوان..." required />
      </div>

      <div class="form-group">
        <label>رابط الصورة (Poster URL)</label>
        <input type="url" id="poster" placeholder="https://example.com/image.jpg" required />
      </div>

      <div class="form-group">
        <label>رابط التشغيل / الفيديو (Stream URL)</label>
        <input type="url" id="streamUrl" placeholder="https://example.com/video.mp4" required />
      </div>

      <div class="form-group">
        <label>النوع</label>
        <select id="type">
          <option value="movie">فيلم</option>
          <option value="series">مسلسل</option>
        </select>
      </div>

      <div class="form-group">
        <label>الوصف</label>
        <textarea id="description" rows="4" placeholder="اكتب وصفاً قصيراً..."></textarea>
      </div>

      <button type="submit">إضافة إلى المكتبة</button>
    </form>

    <div id="status" class="status-msg"></div>
  </div>

  <script>
    document.getElementById('addMediaForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const title = document.getElementById('title').value;
      const status = document.getElementById('status');
      status.textContent = 'تم إضافة "' + title + '" بنجاح!';
      status.className = 'status-msg success';
      this.reset();
      setTimeout(() => { status.style.display = 'none'; }, 3000);
    });
  </script>

</body>
</html>
