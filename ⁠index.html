<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOWA - الرئيسية</title>
  <style>
    :root {
      --bg: #0d0e12;
      --card: #181a20;
      --accent: #e50914;
      --text: #ffffff;
      --text-muted: #a0a0a0;
      --border: #2a2d34;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: var(--card);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      color: var(--accent);
      font-size: 1.8rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-decoration: none;
    }

    .admin-link {
      background-color: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .admin-link:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(180deg, rgba(229, 9, 20, 0.1) 0%, rgba(13, 14, 18, 1) 100%);
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      width: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background-color: var(--card);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card-info {
      padding: 12px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-type {
      font-size: 0.8rem;
      color: var(--accent);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">SHOWA</a>
    <a href="admin.html" class="admin-link">لوحة التحكم</a>
  </header>

  <section class="hero">
    <h1>مرحباً بك في SHOWA</h1>
    <p>منصتك الأفضل لمتابعة الأفلام والمسلسلات</p>
  </section>

  <div class="container">
    <h2>أحدث الإضافات</h2>
    
    <div class="grid" id="mediaGrid">
      <div class="card">
        <img src="https://via.placeholder.com/300x450" alt="Poster" />
        <div class="card-info">
          <div class="card-title">اسم الفيلم / المسلسل</div>
          <div class="card-type">فيلم</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
